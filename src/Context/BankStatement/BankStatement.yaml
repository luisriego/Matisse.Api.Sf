services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        App\Shared\Application\QueryHandler:
            tags: [{ name: 'messenger.message_handler', bus: 'query.bus' }]
        App\Shared\Application\CommandHandler:
            tags: [{ name: 'messenger.message_handler', bus: 'command.bus' }]
        App\Shared\Domain\Event\EventSubscriber:
            tags: ['app.event_subscriber']

    App\Context\BankStatement\Infrastructure\Http\Controller\:
        public: true
        resource: './Infrastructure/Http/Controller/'
        tags: ['controller.service_arguments']

    App\Context\BankStatement\:
        resource: './'
        exclude:
            - './Infrastructure/Http/Controller/'
            - './BankStatement.yaml'

    App\Context\BankStatement\Domain\BankTransactionImportRepository:
        alias: App\Context\BankStatement\Infrastructure\Persistence\Doctrine\DoctrineBankTransactionImportRepository

    App\Context\BankStatement\Application\Matcher\IncomeCreditHistoryMatcherInterface:
        alias: App\Context\BankStatement\Infrastructure\Matcher\IncomeCreditHistoryMatcher

    App\Context\BankStatement\Application\UseCase\ConfirmBankOfxLines\ConfirmBankOfxLinesCommandHandler:
        arguments:
            $defaultCreditIncomeTypeId: '%env(default::DEFAULT_BANK_CREDIT_INCOME_TYPE_ID)%'

    App\Context\BankStatement\Application\Service\SettlementIncomeSplitMap:
        arguments:
            $enabled: '%env(bool:SETTLEMENT_INCOME_SPLIT_ENABLED)%'
            $mapping:
                base: { accountId: '%env(default::SETTLEMENT_SPLIT_BASE_ACCOUNT_ID)%', incomeTypeId: '%env(default::SETTLEMENT_SPLIT_BASE_INCOME_TYPE_ID)%' }
                syndic: { accountId: '%env(default::SETTLEMENT_SPLIT_SYNDIC_ACCOUNT_ID)%', incomeTypeId: '%env(default::SETTLEMENT_SPLIT_SYNDIC_INCOME_TYPE_ID)%' }
                extra: { accountId: '%env(default::SETTLEMENT_SPLIT_EXTRA_ACCOUNT_ID)%', incomeTypeId: '%env(default::SETTLEMENT_SPLIT_EXTRA_INCOME_TYPE_ID)%' }
                reserve: { accountId: '%env(default::SETTLEMENT_SPLIT_RESERVE_ACCOUNT_ID)%', incomeTypeId: '%env(default::SETTLEMENT_SPLIT_RESERVE_INCOME_TYPE_ID)%' }
                gas: { accountId: '%env(default::SETTLEMENT_SPLIT_GAS_ACCOUNT_ID)%', incomeTypeId: '%env(default::SETTLEMENT_SPLIT_GAS_INCOME_TYPE_ID)%' }

    App\Context\BankStatement\Domain\ExpenseEmbeddingRepository:
        alias: App\Context\BankStatement\Infrastructure\Persistence\Doctrine\DoctrineExpenseEmbeddingRepository

    App\Context\BankStatement\Infrastructure\Console\ReindexExpenseEmbeddingsCommand:
        arguments:
            $embeddingModel: '%env(OLLAMA_EMBEDDING_MODEL)%'

    App\Context\BankStatement\Application\Matcher\ExpenseHistoryMatcherInterface:
        alias: App\Context\BankStatement\Infrastructure\Matcher\ExpenseHistoryMatcher

    App\Context\BankStatement\Application\Matcher\EmbeddingVectorClientInterface:
        alias: App\Context\BankStatement\Infrastructure\Matcher\OllamaEmbeddingVectorClient

    App\Context\BankStatement\Infrastructure\Matcher\OllamaEmbeddingVectorClient:
        arguments:
            $ollamaHost: '%env(OLLAMA_HOST)%'
            $embeddingModel: '%env(OLLAMA_EMBEDDING_MODEL)%'

    # Semantic embedding matcher: bind interface to Ollama implementation
    App\Context\BankStatement\Application\Matcher\EmbeddingMatcherInterface:
        alias: App\Context\BankStatement\Infrastructure\Matcher\OllamaEmbeddingsMatcher

    App\Context\BankStatement\Infrastructure\Matcher\OllamaEmbeddingsMatcher:
        arguments:
            $embeddingModel: '%env(OLLAMA_EMBEDDING_MODEL)%'

    App\Context\BankStatement\Infrastructure\EventSubscriber\IndexExpenseEmbeddingOnEntered:
        arguments:
            $embeddingModel: '%env(OLLAMA_EMBEDDING_MODEL)%'
