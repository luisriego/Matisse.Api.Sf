services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\Context\Setup\Infrastructure\Http\Controller\:
        public: true
        resource: './Infrastructure/Http/Controller/'
        tags: ['controller.service_arguments']

    App\Context\Setup\:
        resource: './'
        exclude:
            - './Infrastructure/Http/Controller/'
            - './setup.yaml'
