services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\Context\Expense\Infrastructure\Http\Controller\:
        public: true
        resource: './Infrastructure/Http/Controller/'
        tags: ['controller.service_arguments']

    App\Context\Expense\:
        resource: './'
        exclude:
            - './Domain/Entity/'
            - './Infrastructure/Persistence/Entity/'
            - './Infrastructure/Http/Controller/'
            - './expense.yaml'

    App\Context\Expense\Application\Service\ExpenseAlertService:
        arguments:
            $textGenerator: '@App\Shared\Application\TextGeneratorInterface'
            $logger: '@logger'

    App\Context\Expense\Infrastructure\Symfony\Normalizer\ExpenseNormalizer:
        tags: [serializer.normalizer]

    App\Context\Expense\Infrastructure\Symfony\Normalizer\ExpenseTypeNormalizer:
        tags: [serializer.normalizer]

    App\Context\Expense\Application\Service\InvoiceExtractorService:
        arguments:
            $projectId: '%env(GOOGLE_PROJECT_ID)%'
            $location: '%env(GOOGLE_LOCATION)%'
            $processorId: '%env(GOOGLE_PROCESSOR_ID)%'
