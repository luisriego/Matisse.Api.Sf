services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    # When a service asks for the EventStore interface, provide the consolidated Doctrine implementation.
    App\Shared\Application\EventStore:
        alias: App\Context\EventStore\Infrastructure\Persistence\Doctrine\DoctrineStoreEventRepository

    # When a service asks for the DomainEventRegistry interface, provide the infrastructure map.
    App\Context\EventStore\Domain\DomainEventRegistry:
        alias: App\Context\EventStore\Infrastructure\DomainEventRegistryMap
