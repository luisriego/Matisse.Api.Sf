services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\Context\Slip\Infrastructure\Http\Controller\:
        public: true
        resource: './Infrastructure/Http/Controller/'
        tags: ['controller.service_arguments']

    App\Context\Slip\:
        resource: './'
        exclude:
            - './Domain/Entity/'
            - './Infrastructure/Persistence/Entity/'
            - './Infrastructure/Http/Controller/'
            - './Slip.yaml'

    App\Context\Slip\Application\UseCase\GetSlipDetails\GetSlipDetailsQueryHandler:
        tags: ['messenger.message_handler']

    App\Context\Slip\Domain\SlipRepository:
        alias: App\Context\Slip\Infrastructure\Persistence\Doctrine\DoctrineSlipRepository
