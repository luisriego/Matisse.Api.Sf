services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\Context\Forecast\Infrastructure\Http\Controller\:
        public: true
        resource: './Infrastructure/Http/Controller/'
        tags: ['controller.service_arguments']

    App\Context\Forecast\:
        resource: './'
        exclude:
            - './Infrastructure/Http/Controller/'
            - './Forecast.yaml'
